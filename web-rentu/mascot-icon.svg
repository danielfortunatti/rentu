    <radialGradient id="c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9ec6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff9ec6" stop-opacity="0"/>
