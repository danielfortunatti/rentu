  </defs>
  <!-- Ears -->
  <ellipse cx="38" cy="34" rx="8" ry="10" fill="#08c4ac" transform="rotate(-10,38,44)"/>
  <ellipse cx="82" cy="34" rx="8" ry="10" fill="#08c4ac" transform="rotate(10,82,44)"/>
  <!-- Body -->
  <ellipse cx="60" cy="62" rx="36" ry="34" fill="url(#b)"/>
  <ellipse cx="60" cy="62" rx="36" ry="34" fill="url(#s)"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="56" rx="9" ry="6" fill="white"/>
  <ellipse cx="72" cy="56" rx="9" ry="6" fill="white"/>
  <circle cx="48" cy="57" r="2.8" fill="#1a1a2e"/>
  <circle cx="72" cy="57" r="2.8" fill="#1a1a2e"/>
  <circle cx="46" cy="55" r="1.2" fill="white"/>
  <circle cx="70" cy="55" r="1.2" fill="white"/>
  <!-- Cheeks -->
  <ellipse cx="36" cy="68" rx="7" ry="5" fill="url(#c)" opacity="0.5"/>
  <ellipse cx="84" cy="68" rx="7" ry="5" fill="url(#c)" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M 53 72 Q 60 78 67 72" fill="none" stroke="#047a6e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Arms -->
  <ellipse cx="26" cy="68" rx="6" ry="4" fill="#08c4ac" transform="rotate(-10,32,68)"/>
  <ellipse cx="94" cy="68" rx="6" ry="4" fill="#08c4ac" transform="rotate(10,88,68)"/>
  <!-- Feet -->
