<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" fill="none">
  <!-- Background -->
  <rect width="820" height="200" fill="#FAFBFC"/>

  <!-- Icon background -->
  <rect x="5" y="5" width="190" height="190" rx="38" fill="url(#iconbg2)"/>

  <!-- Cloud -->
  <ellipse cx="50" cy="28" rx="18" ry="7" fill="white" fill-opacity="0.5"/>
  <ellipse cx="62" cy="24" rx="12" ry="6" fill="white" fill-opacity="0.4"/>

  <!-- House body -->
  <rect x="32" y="100" width="136" height="75" rx="3" fill="white" fill-opacity="0.95"/>
  <rect x="32" y="100" width="136" height="75" rx="3" stroke="#B8D8E8" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Roof -->
  <path d="M100 42 L175 100 L25 100 Z" fill="#049E8D"/>
  <path d="M100 42 L175 100 L100 85 Z" fill="#037A6C" fill-opacity="0.3"/>
  <rect x="22" y="98" width="156" height="4" rx="1" fill="#049E8D" fill-opacity="0.15"/>

  <!-- Chimney -->
  <rect x="140" y="55" width="14" height="28" rx="2" fill="#E8E0D8"/>
  <rect x="138" y="52" width="18" height="5" rx="2" fill="#D8D0C8"/>
  <line x1="140" y1="67" x2="154" y2="67" stroke="#D0C8C0" stroke-width="0.8"/>

  <!-- Window left -->
  <rect x="45" y="110" width="28" height="24" rx="3" fill="#C5E6F0"/>
  <rect x="45" y="110" width="28" height="24" rx="3" stroke="#A8D4E2" stroke-width="1.5"/>
  <line x1="59" y1="110" x2="59" y2="134" stroke="white" stroke-width="2"/>
  <line x1="45" y1="122" x2="73" y2="122" stroke="white" stroke-width="2"/>
  <rect x="43" y="133" width="32" height="3" rx="1" fill="#A8D4E2" fill-opacity="0.4"/>

  <!-- Window right -->
  <rect x="127" y="110" width="28" height="24" rx="3" fill="#C5E6F0"/>
  <rect x="127" y="110" width="28" height="24" rx="3" stroke="#A8D4E2" stroke-width="1.5"/>
  <line x1="141" y1="110" x2="141" y2="134" stroke="white" stroke-width="2"/>
  <line x1="127" y1="122" x2="155" y2="122" stroke="white" stroke-width="2"/>
  <rect x="125" y="133" width="32" height="3" rx="1" fill="#A8D4E2" fill-opacity="0.4"/>

  <!-- Door -->
  <rect x="84" y="140" width="32" height="35" rx="4" fill="#049E8D"/>
  <rect x="88" y="145" width="24" height="12" rx="2" fill="#04B89E" fill-opacity="0.4"/>
  <rect x="88" y="161" width="24" height="10" rx="2" fill="#04B89E" fill-opacity="0.4"/>
  <circle cx="110" cy="158" r="2.5" fill="#FFD700"/>
  <rect x="80" y="174" width="40" height="3" rx="1" fill="#D8D0C8"/>

  <!-- Bush -->
  <circle cx="175" cy="170" r="8" fill="#5BB87D" fill-opacity="0.45"/>
  <circle cx="170" cy="166" r="6" fill="#6DC98E" fill-opacity="0.4"/>

  <!-- Ground -->
  <ellipse cx="100" cy="178" rx="82" ry="5" fill="#5BB87D" fill-opacity="0.15"/>

  <!-- Sun -->
  <circle cx="175" cy="25" r="10" fill="#FFE44D" fill-opacity="0.3"/>

  <!-- Text -->
  <text x="220" y="128" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="#2D3B4E" letter-spacing="-2">
    Arrienda<tspan fill="#049E8D">Ya</tspan>
  </text>

  <!-- Tagline - lines separated from text -->
  <line x1="222" y1="148" x2="265" y2="148" stroke="#049E8D" stroke-width="2" stroke-opacity="0.35"/>
  <text x="275" y="155" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" fill="#8899AA" letter-spacing="4">ARRIENDOS EN CHILE</text>
  <line x1="545" y1="148" x2="588" y2="148" stroke="#049E8D" stroke-width="2" stroke-opacity="0.35"/>

  <defs>
    <linearGradient id="iconbg2" x1="5" y1="5" x2="195" y2="195" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0F2F0"/>
      <stop offset="50%" stop-color="#D0EBE8"/>
      <stop offset="100%" stop-color="#C0E4E0"/>
    </linearGradient>
  </defs>
</svg>
