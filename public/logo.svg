<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <!-- Background circle -->
  <circle cx="250" cy="250" r="245" fill="#049E8D"/>
  <circle cx="250" cy="250" r="235" fill="url(#grad1)"/>

  <!-- House shape -->
  <path d="M250 95 L400 210 L400 380 Q400 400 380 400 L120 400 Q100 400 100 380 L100 210 Z" fill="white" fill-opacity="0.15"/>
  <path d="M250 115 L380 215 L380 370 Q380 385 365 385 L135 385 Q120 385 120 370 L120 215 Z" fill="white" fill-opacity="0.1"/>

  <!-- Door -->
  <rect x="215" y="280" width="70" height="105" rx="8" fill="white" fill-opacity="0.25"/>
  <circle cx="272" cy="335" r="5" fill="white" fill-opacity="0.5"/>

  <!-- Roof -->
  <path d="M250 80 L420 215 L405 230 L250 110 L95 230 L80 215 Z" fill="white"/>

  <!-- Chimney -->
  <rect x="330" y="120" width="35" height="70" rx="4" fill="white"/>

  <!-- Letter A -->
  <text x="250" y="340" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-5">A</text>

  <!-- Small "Ya" text -->
  <text x="310" y="340" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="700" fill="#B8F5E8" text-anchor="start" letter-spacing="-1">Ya</text>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0DBFA3"/>
      <stop offset="100%" stop-color="#048A78"/>
    </linearGradient>
  </defs>
</svg>
